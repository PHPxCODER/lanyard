services:
  redis:
    image: redis:alpine
    restart: always
    networks:
      - lanyard_net
    volumes:
      - lanyard-redis-data:/data

  lanyard:
    image: ${LANYARD_IMAGE:-lanyard:latest}
    restart: always
    ports:
      - 4001:4001
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      REDIS_HOST: redis
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4001}
      DISCORD_INVITE_URL: ${DISCORD_INVITE_URL:-https://discord.gg/lanyard}
    networks:
      - lanyard_net
    depends_on:
      - redis

networks:
  lanyard_net:
    driver: bridge

volumes:
  lanyard-redis-data:
    external: true
