services:
  redis:
    image: redis
    restart: always
    container_name: lanyard_redis
    networks:
      - lanyard_net
    volumes:
      - lanyard-redis-data:/data

  lanyard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: lanyard
    depends_on:
      - redis
    ports:
      - 4001:4001
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      REDIS_HOST: redis
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4001}
      DISCORD_INVITE_URL: ${DISCORD_INVITE_URL:-https://discord.gg/lanyard}
    networks:
      - lanyard_net

networks:
  lanyard_net:
    driver: bridge

volumes:
  lanyard-redis-data:
    external: true
